<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的購物車 - 電子書商城</title>
    
    <!-- ✅ 讀取本地 CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        
        /* 🎨 為了統一風格，加入與 index.html 相同的導覽列樣式 */
        .navbar { background-color: #212529 !important; margin-bottom: 30px; }
        .nav-link { color: white !important; font-size: 14px; }
        .navbar-brand { color: white !important; }

        .cart-container { max-width: 900px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .table thead { background-color: #f1f3f5; }
        .total-section { border-top: 2px solid #dee2e6; padding-top: 20px; margin-top: 20px; }
        .btn-checkout { padding: 10px 40px; font-size: 1.1rem; border-radius: 50px; }
		.cart-container {
		    border-radius: 20px;
		}

		.table td, .table th {
		    vertical-align: middle;
		}

        /* 數量控制區：flex 水平對齊 */
        .qty-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #ced4da;
            background: #fff;
            font-size: 16px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            flex-shrink: 0;
        }
        .qty-btn:hover { background: #f1f3f5; }

        .qty-num {
            font-size: 16px;
            font-weight: bold;
            min-width: 28px;
            text-align: center;
        }

		.btn-outline-danger {
		    width: 32px;
		    height: 32px;
		    border-radius: 50%;
		    padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
		}

		.total-section {
		    border-top: 2px solid #eee;
		    margin-top: 30px;
		    padding-top: 20px;
		}

		.btn-checkout {
		    background: #212529;
		    border: none;
		}

		.btn-checkout:hover {
		    background: #000;
		}
		
		/* ⭐ 購物車數量 badge 美化 */
		.badge {
		    font-size: 10px;
		    padding: 5px 6px;
		}
    </style>
</head>
<body>

    <!-- ✅ 修改重點 1：改用空的 div，讓 navbar.js 自動填入含有登入資訊的導覽列 -->
    <div id="navbar"></div>

    <div class="container">
        <div class="cart-container shadow-sm">
            <h2 class="text-center mb-4 fw-bold">🛒 我的購物車</h2>

            <!-- 💡 Bootstrap 表格樣式 -->
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr class="text-secondary">
                            <th>書名</th>
                            <th class="text-center">價格</th>
                            <th class="text-center">數量</th>
                            <th class="text-center">小計</th>
                            <th class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="cart-list">
                        <!-- 由 cart.js 動態填入 -->
                    </tbody>
                </table>
            </div>

            <!-- 總金額區塊 -->
            <div class="total-section d-flex justify-content-between align-items-center">
                <a href="index.html" class="text-decoration-none text-secondary">← 繼續購物</a>
                <div class="text-end">
                    <h4 class="mb-3">總金額：<span class="text-danger fw-bold">NT$ <span id="totalPrice">0</span></span></h4>
                    <a href="checkout.html" class="btn btn-primary btn-checkout shadow">前往結帳</a>
                </div>
            </div>
        </div>
    </div>

    <!-- ✅ 修改重點 2：依序讀取腳本 -->
    <script src="js/jquery.min.js"></script>
	<script src="js/common.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/navbar.js"></script> <!-- ⭐ 負責動態產生導覽列與處理登入/登出 -->

</body>
</html>
