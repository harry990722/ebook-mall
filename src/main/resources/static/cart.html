<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的購物車 - 電子書商城</title>
    <link rel="stylesheet" href="css/site.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .cart-actions {
            display: flex; justify-content: space-between; align-items: center;
            padding: 28px 0 0; border-top: 1px solid var(--cream-2); margin-top: 8px;
        }
        .cart-total { font-family: 'Noto Serif TC', serif; font-size: 1.4rem; font-weight: 700; color: var(--text); }
        .cart-total span { color: var(--red); }
        .empty-state {
            text-align: center; padding: 64px 32px; color: var(--text-muted);
        }
        .empty-state .empty-icon { font-size: 3.5rem; margin-bottom: 16px; opacity: 0.4; }
        .empty-state p { font-size: 0.95rem; }
        .trash-btn {
            width: 34px; height: 34px;
            border: 1.5px solid #fcc; border-radius: 50%;
            background: transparent; cursor: pointer;
            color: var(--red); display: flex; align-items: center; justify-content: center;
            transition: var(--transition); margin: 0 auto;
        }
        .trash-btn:hover { background: #fff5f5; }
    </style>
</head>
<body>
<div id="navbar"></div>
<div class="page-wrap">
    <div class="card fade-up">
        <div class="card-body">
            <h2 class="page-title">我的購物車</h2>
            <div style="overflow-x:auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>書名</th>
                            <th style="text-align:center">單價</th>
                            <th style="text-align:center">數量</th>
                            <th style="text-align:center">小計</th>
                            <th style="text-align:center">移除</th>
                        </tr>
                    </thead>
                    <tbody id="cart-list"></tbody>
                </table>
            </div>
            <div class="cart-actions">
                <a href="index.html" class="btn btn-outline">← 繼續購物</a>
                <div style="text-align:right">
                    <div class="cart-total">總計：<span>NT$ <span id="totalPrice">0</span></span></div>
                    <a href="checkout.html" class="btn btn-primary btn-lg" style="margin-top:16px">前往結帳 →</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="js/jquery.min.js"></script>
<script src="js/common.js"></script>
<script src="js/cart.js"></script>
<script src="js/navbar.js"></script>
</body>
</html>
