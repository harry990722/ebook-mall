<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電子書商城</title>
<link rel="stylesheet" href="css/site.css">
<style>
    /* ===== Banner ===== */
    .banner-wrap {
        border-radius: var(--radius-lg);
        overflow: hidden;
        height: 440px;
        position: relative;
        box-shadow: var(--shadow-lg);
        margin-bottom: 8px;
    }
    .carousel-inner, .carousel-item { width: 100%; height: 100%; }
    .carousel-item img { width: 100%; height: 440px; object-fit: cover; filter: brightness(0.65); }
    .banner-text {
        position: absolute; bottom: 0; left: 0; right: 0;
        padding: 40px 48px;
        background: linear-gradient(to top, rgba(15,17,23,0.85) 0%, transparent 100%);
        z-index: 10; pointer-events: none;
    }
    .banner-text h2 {
        font-family: 'Noto Serif TC', serif;
        color: white; font-size: 1.7rem; font-weight: 700;
        margin-bottom: 6px; text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .banner-text p { color: rgba(255,255,255,0.75); font-size: 0.9rem; }
    .carousel-indicators button {
        width: 7px; height: 7px; border-radius: 50%;
        background: rgba(255,255,255,0.5); border: none; margin: 0 4px;
    }
    .carousel-indicators .active { background: var(--gold); }

    /* ===== 搜尋控制區 ===== */
    .control-bar {
        background: white; border-radius: var(--radius);
        padding: 20px 24px; margin-bottom: 36px;
        box-shadow: var(--shadow-sm);
        display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
        padding: 7px 20px; border-radius: 50px; font-size: 0.85rem;
        font-weight: 500; cursor: pointer; border: 1.5px solid var(--cream-2);
        background: transparent; color: var(--text-muted);
        transition: var(--transition); font-family: 'Noto Sans TC', sans-serif;
    }
    .filter-btn:hover, .filter-btn.active {
        background: var(--ink); color: white; border-color: var(--ink);
    }
    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .search-wrap input {
        width: 100%; padding: 10px 16px 10px 40px;
        border: 1.5px solid var(--cream-2); border-radius: 50px;
        font-size: 0.88rem; background: var(--cream);
        font-family: 'Noto Sans TC', sans-serif; outline: none;
        transition: var(--transition);
    }
    .search-wrap input:focus { border-color: var(--gold); background: white; }
    .search-icon {
        position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
        color: var(--text-muted); font-size: 14px;
    }

    /* ===== 商品卡片 ===== */
    .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    @media(max-width:900px){ .product-grid { grid-template-columns: repeat(3,1fr); } }
    @media(max-width:600px){ .product-grid { grid-template-columns: repeat(2,1fr); } }

    .product-card {
        background: white; border-radius: var(--radius); overflow: hidden;
        cursor: pointer; transition: var(--transition);
        box-shadow: var(--shadow-sm);
    }
    .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
    .product-card:hover .pcard-img { transform: scale(1.05); }

    .pcard-img-wrap {
        aspect-ratio: 3/4; overflow: hidden; position: relative;
        background: var(--cream-2);
    }
    .pcard-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.35s ease; }
    .pcard-discount {
        position: absolute; top: 10px; left: 10px;
        background: var(--red); color: white;
        font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
        padding: 3px 10px; border-radius: 50px;
    }
    .pcard-body { padding: 14px 16px 18px; }
    .pcard-title {
        font-weight: 700; font-size: 0.88rem; line-height: 1.45;
        height: 2.6em; overflow: hidden; margin-bottom: 4px; color: var(--text);
    }
    .pcard-author { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 10px; }
    .pcard-price { display: flex; align-items: baseline; gap: 8px; }
    .pcard-now { color: var(--red); font-weight: 700; font-size: 1rem; }
    .pcard-old { color: #bbb; text-decoration: line-through; font-size: 0.78rem; }

    /* ===== 分頁 ===== */
    .page-btn {
        min-width: 36px; height: 36px;
        border: 1.5px solid var(--cream-2); border-radius: 50%;
        background: white; cursor: pointer; font-size: 0.88rem;
        font-weight: 500; color: var(--text-muted);
        transition: var(--transition); display: inline-flex;
        align-items: center; justify-content: center; padding: 0 8px;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--text); }
    .page-btn.active { background: var(--ink); color: white; border-color: var(--ink); }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .page-dots { color: var(--text-muted); font-size: 0.9rem; padding: 0 2px; }
</style>
</head>
<body>
<div id="navbar"></div>
<div class="page-wrap-wide">

    <!-- Banner -->
    <div id="heroBanner" class="carousel slide banner-wrap mt-2" data-bs-ride="carousel" data-bs-interval="4500" style="margin-bottom:40px">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#heroBanner" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#heroBanner" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#heroBanner" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=1400&q=80" alt="精選好書">
            </div>
            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d?w=1400&q=80" alt="新書上架">
            </div>
            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=1400&q=80" alt="限時優惠">
            </div>
        </div>
        <div class="banner-text">
            <h2>📚 電子書商城精選好書</h2>
            <p>技術・商業・心理學，每本都是你的競爭力</p>
        </div>
    </div>

    <!-- 搜尋與分類 -->
    <div class="control-bar">
        <div class="filter-pills">
            <button class="filter-btn active" data-type="all">全部</button>
            <button class="filter-btn" data-type="tech">💻 技術</button>
            <button class="filter-btn" data-type="business">💼 商業</button>
            <button class="filter-btn" data-type="mind">🧠 心理</button>
        </div>
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="搜尋書名、作者...">
        </div>
    </div>

    <!-- 新書焦點 -->
    <div class="section-header">
        <div class="section-title">書籍列表</div>
        <div id="total-items" style="font-size:0.85rem;color:var(--text-muted)"></div>
    </div>
    <div class="product-grid" id="product-list"></div>

    <!-- ⭐ 分頁元件 -->
    <div id="pagination-wrap" style="display:none;text-align:center;margin:36px 0 12px">
        <div id="pagination-btns" style="display:inline-flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center"></div>
    </div>

    <div class="product-grid" id="product-list-2"></div>

</div>

<footer class="site-footer">© 2026 電子書商城 · 閱讀，讓你走得更遠</footer>

<!-- Bootstrap JS for carousel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script src="js/jquery.min.js"></script>
<script src="js/common.js"></script>
<script src="js/index.js"></script>
<script src="js/navbar.js"></script>
</body>
</html>
