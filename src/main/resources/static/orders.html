<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的訂單 - 電子書商城</title>
    <link rel="stylesheet" href="css/site.css">
    <style>
        .order-id { font-size: 0.8rem; color: var(--text-muted); font-family: monospace; }
        .order-empty { text-align:center; padding: 64px; color: var(--text-muted); }
        .order-empty .icon { font-size: 3rem; opacity: 0.3; margin-bottom: 16px; }
    </style>
</head>
<body>
<div id="navbar"></div>
<div class="page-wrap">
    <div class="card fade-up">
        <div class="card-body">
            <h2 class="page-title">我的訂單</h2>
            <div style="overflow-x:auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>訂單編號</th>
                            <th>收件人</th>
                            <th>地址</th>
                            <th style="text-align:right">金額</th>
                            <th style="text-align:center">狀態</th>
                        </tr>
                    </thead>
                    <tbody id="order-list"></tbody>
                </table>
            </div>
            <div style="text-align:center;margin-top:32px;padding-top:24px;border-top:1px solid var(--cream-2)">
                <a href="index.html" class="btn btn-outline">← 返回商城首頁</a>
            </div>
        </div>
    </div>
</div>
<script src="js/jquery.min.js"></script>
<script src="js/common.js"></script>
<script src="js/orders.js"></script>
<script src="js/navbar.js"></script>
</body>
</html>
