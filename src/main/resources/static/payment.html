<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單付款 - 電子書商城</title>
    <link rel="stylesheet" href="css/site.css">
    <style>
        .payment-card {
            max-width: 480px; margin: 0 auto;
            background: var(--ink); border-radius: var(--radius-lg);
            padding: 52px 48px; text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            animation: fadeUp 0.5s ease;
        }
        .payment-icon { font-size: 3rem; margin-bottom: 16px; }
        .payment-label { color: rgba(255,255,255,0.5); font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
        .payment-amount {
            font-family: 'Noto Serif TC', serif;
            font-size: 2.8rem; font-weight: 700;
            color: var(--gold-light);
            margin-bottom: 32px;
        }
        .payment-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 28px 0; }
        .payment-note { font-size: 0.82rem; color: rgba(255,255,255,0.4); margin-bottom: 28px; line-height: 1.7; }
        .btn-pay {
            width: 100%; padding: 16px;
            background: var(--gold); color: var(--ink);
            border: none; border-radius: 50px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: var(--transition); font-family: 'Noto Sans TC', sans-serif;
        }
        .btn-pay:hover { background: var(--gold-light); transform: translateY(-2px); }
        .back-link { display: block; margin-top: 20px; color: rgba(255,255,255,0.35); font-size: 0.82rem; text-decoration: none; }
        .back-link:hover { color: rgba(255,255,255,0.6); }
        body { background: var(--ink-2); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; }
    </style>
</head>
<body>
<div class="payment-card">
    <div class="payment-icon">💳</div>
    <div class="payment-label">本次結帳總金額</div>
    <div class="payment-amount">NT$ <span id="amount">0</span></div>
    <div class="payment-divider"></div>
    <div class="payment-note">請確認金額無誤後，點擊下方按鈕完成付款。<br>付款完成後將立即開通您的電子書權限。</div>
    <button id="payBtn" class="btn-pay">立即付款</button>
    <a href="index.html" class="back-link">稍後再付，返回首頁</a>
</div>
<script src="js/jquery.min.js"></script>
<script src="js/common.js"></script>
<script src="js/payment.js"></script>
</body>
</html>
