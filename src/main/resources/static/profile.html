<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人資料 - 電子書商城</title>
    <link rel="stylesheet" href="css/site.css">
</head>
<body>
<div id="navbar"></div>
<div class="page-wrap">
    <div class="card fade-up" style="max-width:520px;margin:0 auto">
        <div class="card-body">
            <h2 class="page-title">個人資料</h2>

            <!-- 帳號資訊 -->
            <div style="background:var(--cream);border-radius:var(--radius-sm);padding:20px;margin-bottom:32px">
                <div style="display:flex;align-items:center;gap:16px">
                    <div style="width:56px;height:56px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0">👤</div>
                    <div>
                        <div style="font-weight:700;font-size:1.05rem" id="profileUsername">-</div>
                        <div style="font-size:0.82rem;color:var(--text-muted);margin-top:2px" id="profileRole">-</div>
                    </div>
                </div>
            </div>

            <!-- 修改密碼 -->
            <div style="border-top:1px solid var(--cream-2);padding-top:28px">
                <div style="font-size:0.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);border-left:3px solid var(--gold);padding-left:10px;margin-bottom:20px">修改密碼</div>
                <div class="form-group">
                    <label class="form-label">目前密碼</label>
                    <input type="password" id="oldPassword" class="form-control" placeholder="請輸入目前密碼">
                </div>
                <div class="form-group">
                    <label class="form-label">新密碼</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="請輸入新密碼（至少 4 個字元）">
                </div>
                <div class="form-group">
                    <label class="form-label">確認新密碼</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="再次輸入新密碼">
                </div>
                <button id="changePasswordBtn" class="btn btn-primary btn-full">確認修改密碼</button>
            </div>

            <div style="text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--cream-2)">
                <a href="orders.html" class="btn btn-outline btn-sm">查看我的訂單</a>
            </div>
        </div>
    </div>
</div>
<script src="js/jquery.min.js"></script>
<script src="js/common.js"></script>
<script src="js/profile.js"></script>
<script src="js/navbar.js"></script>
</body>
</html>
