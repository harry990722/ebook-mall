<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單完成 - 電子書商城</title>
    <link rel="stylesheet" href="css/site.css">
    <style>
        body { background: var(--ink-2); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; }
        .success-card {
            max-width: 480px; width: 100%;
            background: var(--cream); border-radius: var(--radius-lg);
            padding: 64px 48px; text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            animation: fadeUp 0.6s ease;
        }
        .success-ring {
            width: 88px; height: 88px; border-radius: 50%;
            background: linear-gradient(135deg, #d4edda, #a8d5b5);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; margin: 0 auto 28px;
            box-shadow: 0 8px 24px rgba(56,161,105,0.25);
        }
        .success-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.6rem; font-weight: 700; margin-bottom: 12px;
        }
        .success-text { color: var(--text-muted); font-size: 0.9rem; line-height: 1.8; margin-bottom: 36px; }
        .success-divider { height: 1px; background: var(--cream-2); margin: 28px 0; }
        .success-links { display: flex; flex-direction: column; gap: 12px; }
    </style>
</head>
<body>
<div class="success-card">
    <div class="success-ring">🎉</div>
    <div class="success-title">訂單完成！</div>
    <div class="success-text">
        感謝您的購買，您的電子書已準備好供您閱讀。<br>
        訂單細節已發送至您的會員帳號。
    </div>
    <div class="success-divider"></div>
    <div class="success-links">
        <a href="index.html" class="btn btn-primary btn-lg">返回商城首頁</a>
        <a href="orders.html" class="btn btn-outline">查看我的訂單</a>
    </div>
</div>
</body>
</html>
